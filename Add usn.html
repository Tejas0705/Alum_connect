<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add USN Numbers</title>
    <link rel="icon" href="./public/alumfavicon.png" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .container h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .container label {
            display: block;
            margin-bottom: 5px;
        }
        .container input[type="text"] {
            width: 95%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .container button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #0056b3;
        }
    </style>
    <!-- Add Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>Add USN Number</h1>
        <form id="usnForm">
            <label for="usn">USN Number</label>
            <input type="text" id="usn" name="usn" required>
            <button type="submit">Add USN</button>
        </form>
    </div>

    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC-eWRPO-nLM1mvksKl1uFWW09ORFPwYrc",
            authDomain: "alum-connect07.firebaseapp.com",
            projectId: "alum-connect07",
            storageBucket: "alum-connect07.appspot.com",
            messagingSenderId: "867951212899",
            appId: "1:867951212899:web:0c2fad0410585efcd7bb56",
            measurementId:"G-1CM9T86ZKB"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('usnForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const usn = document.getElementById('usn').value;

            if (!usn) {
                alert('USN number is required');
                return;
            }

            try {
                await db.collection('usnNumbers').doc(usn).set({ usn });
                alert('USN number added successfully');
                document.getElementById('usn').value = '';
            } catch (error) {
                console.error('Error adding USN number:', error);
                alert('Failed to add USN number');
            }
        });
    </script>
</body>
</html>
